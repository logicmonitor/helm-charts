image:
  repository: logicmonitor/lm-logs-k8s-fluentd
  pullPolicy: Always
  tag: "1.4.0"

lm_access_id: ""
lm_access_key: ""
lm_company_name: ""
lm_bearer_token: ""
lm_company_domain: ""

authMode: "lmv1"  # or "lmv1/bearer"

global:
  userDefinedSecret: ""  # Uncomment and set to use a custom secret for credentials
  # The referenced secret must contain the following keys (all base64 encoded):
  #   accessID
  #   accessKey
  #   bearerToken
  #   account
  accessID: ""
  accessKey: ""
  account: ""
  clusterName: ""
  companyDomain: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

labels: {}
annotations: {}

env: {}

resources:
  limits:
    memory: 1000Mi
  requests:
    cpu: 300m
    memory: 700Mi
fluent:
  device_less_logs: false
  include_metadata: true
  resource_type: ""

  # Extra Fluentd filters injected after kubernetes_metadata enrichment,
  # inside <label @PROCESS_AFTER_CONCAT>. Use for include/exclude filtering.
  #
  # Example – drop logs from kube-system namespace:
  #   extraFilters: |
  #     <filter kubernetes.**>
  #       @type grep
  #       <exclude>
  #         key $.kubernetes.namespace_name
  #         pattern /^kube-system$/
  #       </exclude>
  #     </filter>
  #
  # Example – keep only logs matching a pattern:
  #   extraFilters: |
  #     <filter kubernetes.**>
  #       @type grep
  #       <regexp>
  #         key message
  #         pattern /ERROR|WARN/
  #       </regexp>
  #     </filter>
  extraFilters: ""

  buffer:
    type: memory
    memory:
      flush_interval: 1s
      chunk_limit_size: 8m
      flush_thread_count: 8
      total_limit_size: 512m
      compress: gzip   # text|gzip

    # type: file
    # file:
    #   path: /fluentd/buffer/lm-logs     # prefix path for chunks
    #   mountPath: /fluentd/buffer        # mount point inside container
    #   sizeLimit: 10Gi                  # optional emptyDir size limit

    #   flush_interval: 1s
    #   chunk_limit_size: 8m
    #   flush_thread_count: 8
    #   total_limit_size: 8gb
    #   compress: gzip   # text|gzip

  # Fluentd monitor_agent exposes plugin/buffer metrics over HTTP.
  # When enabled, a <source> block is added to the ConfigMap and the
  # corresponding port is exposed on the DaemonSet container so that
  # clients can scrape buffer metrics (e.g. via `kubectl port-forward`).
  #
  # Example query (after `kubectl port-forward` to the pod):
  #   curl http://127.0.0.1:24220/api/plugins.json
  monitorAgent:
    enabled: false
    bind: 0.0.0.0
    port: 24220

systemd:
  tag: ""
  conf: ""

useSystemdConf: false

securityContext: null

priorityClassName: null

kubernetes:
  containerTailParserType: cri    # "cri" (recommended for containerd/CRI-O) or "multi_format"
  multiline_start_regexp: /^\[(\d{4}-)?\d{2}-\d{2} \d{2}:\d{2}:\d{2}.\d{3}.*\]/
  cluster_name: ""
  multiline_concat_key: log

nodeSelector: {}
affinity: {}
tolerations: []


volumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers
  - name: journal
    hostPath:
      path: /var/log/journal


volumeMounts:
  - name: fluentconf
    mountPath: /fluentd/etc
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
  - name: journal
    mountPath: /var/log/journal
    readOnly: true

extraVolumes: []
extraVolumeMounts: []
